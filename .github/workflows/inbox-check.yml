name: 統合受信箱チェック（朝晩2回）

on:
  schedule:
    - cron: '0 0 * * *'    # JST 9:00
    - cron: '0 12 * * *'   # JST 21:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run（シートへの書き込みをスキップ）'
        required: false
        default: 'false'
        type: boolean

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-sns-automation/package-lock.json

      - name: 依存関係インストール
        run: npm install
        working-directory: ai-sns-automation

      - name: 受信箱チェック（Instagram DM / Chatwork / Gmail）
        env:
          # Instagram DM（未設定ならスキップ）
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          # Chatwork（未設定ならスキップ）
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          # Gmail（未設定ならスキップ）
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          # 受注管理シート（GAS台帳API）
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
        run: |
          set -o pipefail
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY_RUN_FLAG="--dry-run"; fi
          echo "## 統合受信箱チェック結果" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/check_inbox.mjs $DRY_RUN_FLAG | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        working-directory: ai-sns-automation
