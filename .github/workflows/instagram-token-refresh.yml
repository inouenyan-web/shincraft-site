name: Instagramトークン自動更新（月2回）

on:
  schedule:
    - cron: '0 0 1,15 * *'   # 毎月1日・15日 UTC0時。60日トークンを最大15日間隔で延長＝失効させない
  workflow_dispatch:          # 手動実行も可能

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-sns-automation/package.json

      - name: 依存パッケージをインストール
        run: npm install
        working-directory: ai-sns-automation

      - name: 長期トークンを延長してGASに保存
        working-directory: ai-sns-automation
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
        run: node scripts/refresh_token.mjs
