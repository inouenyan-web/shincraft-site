name: 背景透過バッチ（1時間ごと）

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分（UTC）= 日本時間 毎時9分
  workflow_dispatch:        # GitHubのActionsタブから手動実行も可能

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-sns-automation/package.json

      - name: AIモデルキャッシュ
        uses: actions/cache@v4
        with:
          path: ~/.cache/imgly
          key: imgly-bg-removal-models-v1

      - name: 依存パッケージをインストール
        run: npm install
        working-directory: ai-sns-automation

      - name: 背景透過バッチ実行
        run: node scripts/batch_bg_remove.mjs
        working-directory: ai-sns-automation
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
          DRIVE_NOBG_FOLDER_ID: ${{ secrets.DRIVE_NOBG_FOLDER_ID }}
