name: PhotoRoom 背景透過（1時間ごと）

on:
  workflow_dispatch:        # GitHubのActionsタブから手動実行

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-sns-automation/package.json

      - name: 依存パッケージをインストール
        run: npm ci
        working-directory: ai-sns-automation

      - name: PhotoRoom 背景透過バッチ実行
        run: node scripts/batch_photoroom.mjs
        working-directory: ai-sns-automation
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
          PHOTOROOM_API_KEY: ${{ secrets.PHOTOROOM_API_KEY }}
          DRIVE_NOBG_FOLDER_ID: ${{ secrets.DRIVE_NOBG_FOLDER_ID }}
