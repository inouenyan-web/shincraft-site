name: Instagram DM監視（朝晩2回）

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 0:00 = JST 9:00
    - cron: '0 12 * * *'   # UTC 12:00 = JST 21:00
  workflow_dispatch:         # GitHubのActionsタブから手動実行も可能

# DM監視はMETA_ACCESS_TOKENに instagram_manage_messages スコープが必要。
# 現在は B1（システムユーザートークン取得）が完了してからアクティブになる。
# スコープ不足の場合はスクリプトが Chrome版Claude用プロンプトをStepSummaryに出力して終了（失敗にならない）。

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-sns-automation/package.json

      - name: 依存パッケージをインストール
        run: npm install
        working-directory: ai-sns-automation

      - name: Instagram DM監視・受注見込み記録
        working-directory: ai-sns-automation
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -o pipefail
          echo '## Instagram DM監視結果' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/check_dm.mjs | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
