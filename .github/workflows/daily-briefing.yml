name: AI共有ブリーフィング＆受信箱回収（双方向ルーティン）

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = 日本時間 朝6:00（朝の報告会＝配信）
    - cron: '0 12 * * *'   # UTC 12:00 = 日本時間 21:00（夜の受信箱回収）
  workflow_dispatch:        # 手動実行も可能
  repository_dispatch:      # 受信箱が更新された瞬間に起動（GAS Driveトリガー等から叩く）
    types: [inbox_updated]

permissions:
  contents: write   # 報告会資料・運用ボードをコミットするため

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 受信箱を回収（コワーク/チャット → コードの戻り）
        working-directory: ai-sns-automation
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
        run: |
          set -o pipefail
          node scripts/process_inbox.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 報告会資料を生成
        working-directory: ai-sns-automation
        run: |
          set -o pipefail
          node scripts/daily_briefing.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'AI共有ブリーフィング_最新.md' '運用ボード.md' 'ai-sns-automation/data/inbox_snapshot.txt'
          if [[ -n "$(git status --porcelain 'AI共有ブリーフィング_最新.md' '運用ボード.md' 'ai-sns-automation/data/inbox_snapshot.txt')" ]]; then
            git commit -m "chore: 朝/夜ルーティン 報告会資料更新＋受信箱回収 [skip ci]"
            git push
          else
            echo "変更なし（コミット不要）"
          fi
