name: AI共有ブリーフィング（毎朝6時）

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = 日本時間 朝6:00
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write   # 報告会資料をコミットするため

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 報告会資料を生成
        working-directory: ai-sns-automation
        run: |
          set -o pipefail
          node scripts/daily_briefing.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 報告会資料をコミット
        run: |
          if [[ -n "$(git status --porcelain 'AI共有ブリーフィング_最新.md')" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add 'AI共有ブリーフィング_最新.md'
            git commit -m "chore: 朝6時 全AI報告会資料を更新 [skip ci]"
            git push
          else
            echo "変更なし（コミット不要）"
          fi
