name: AI共有ブリーフィング＆受信箱回収（双方向ルーティン）

on:
  schedule:
    # 日本時間 0/6/12/18時の1日4回（GitHubのcronはUTC。JST = UTC+9）
    - cron: '0 15 * * *' # JST 0:00
    - cron: '0 21 * * *' # JST 6:00
    - cron: '0 3 * * *'  # JST 12:00
    - cron: '0 9 * * *'  # JST 18:00
  workflow_dispatch: # 手動実行も可能
  repository_dispatch: # 受信箱が更新された瞬間に起動（GAS Driveトリガー等から叩く）
    types: [inbox_updated]

permissions:
  contents: write # 報告会資料・運用ボードをコミットするため

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 受信箱を回収（コワーク/チャット → コードの戻り）
        working-directory: ai-sns-automation
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
        run: |
          set -o pipefail
          node scripts/process_inbox.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Chatwork 新着チェック（受注関連をタスク化）
        working-directory: ai-sns-automation
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
        run: |
          set -o pipefail
          node scripts/check_chatwork.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Gmail 新着チェック（受注関連をタスク化）
        working-directory: ai-sns-automation
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          set -o pipefail
          node scripts/check_gmail.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Instagram DM 新着チェック（受注関連をタスク化 / トークン未設定なら自動スキップ）
        working-directory: ai-sns-automation
        env:
          IG_DM_TOKEN: ${{ secrets.IG_DM_TOKEN }}
        run: |
          set -o pipefail
          node scripts/check_instagram_dm.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Instagram DM 手動チェックのリマインドを運用ボードへ反映（DM自動化が無効な間のみ補助）
        working-directory: ai-sns-automation
        run: |
          set -o pipefail
          node scripts/instagram_dm_reminder.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 報告会資料を生成
        working-directory: ai-sns-automation
        run: |
          set -o pipefail
          node scripts/daily_briefing.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'AI共有ブリーフィング_最新.md' '運用ボード.md' 'ai-sns-automation/data/inbox_snapshot.txt'
          if [[ -n "$(git status --porcelain 'AI共有ブリーフィング_最新.md' '運用ボード.md' 'ai-sns-automation/data/inbox_snapshot.txt')" ]]; then
            git commit -m "chore: 1日4回ルーティン 報告会資料更新＋受信箱回収＋Chatwork/Gmail/IG DMチェック [skip ci]"
            git push
          else
            echo "変更なし（コミット不要）"
          fi
