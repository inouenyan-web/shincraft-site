name: Instagramチェック（毎朝）

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日UTC 0:00 = 日本時間 朝9:00
  workflow_dispatch:        # GitHubのActionsタブから手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-sns-automation/package.json

      - name: 依存パッケージをインストール
        run: npm install
        working-directory: ai-sns-automation

      - name: GASからトークンを取得
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_TOKEN: ${{ secrets.GAS_SHARED_TOKEN }}
        run: |
          RESP=$(curl -sS -L -X POST "$GAS_WEBAPP_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$GAS_SHARED_TOKEN\",\"action\":\"getConfig\",\"key\":\"META_ACCESS_TOKEN\"}")
          TOKEN=$(echo "$RESP" | jq -r '.value // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::GASにMETA_ACCESS_TOKENが未設定です。GAS再デプロイ後にbootstrap_gas.mjsを実行してください。"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "META_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Instagramチェック実行（結果をサマリに出力）
        working-directory: ai-sns-automation
        env:
          IG_USER_ID: "17841463083883101"
          META_ACCESS_TOKEN: ${{ env.META_ACCESS_TOKEN }}
        run: |
          echo '## @shincraft2023 チェック結果' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/check_instagram.mjs | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
