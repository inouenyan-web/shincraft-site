name: Instagramチェック（1日4回）

on:
  schedule:
    # 日本時間 0/6/12/18時の1日4回（GitHubのcronはUTC。JST = UTC+9）
    - cron: '0 15 * * *' # JST 0:00
    - cron: '0 21 * * *' # JST 6:00
    - cron: '0 3 * * *'  # JST 12:00
    - cron: '0 9 * * *'  # JST 18:00
  workflow_dispatch: # GitHubのActionsタブから手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-sns-automation/package.json

      - name: 依存パッケージをインストール
        run: npm install
        working-directory: ai-sns-automation

      - name: Instagramチェック実行（結果をサマリに出力）
        working-directory: ai-sns-automation
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: |
          set -o pipefail
          echo '## @shincraft2023 チェック結果' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/check_instagram.mjs | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
